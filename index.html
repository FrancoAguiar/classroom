<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom - Aprendizaje Minimalista</title>
    <style>
        /* CSS BASE OBLIGATORIO */
        body {
            background-color: #0A0A0A;
            color: #E5E5E5;
            -webkit-font-smoothing: antialiased;
            margin: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow-x: hidden;
        }
        ::selection { background: rgba(255, 69, 0, 0.3); color: white; }
        .bg-grid-pattern {
            background-size: 50px 50px;
            background-image:
                linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
            -webkit-mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0A0A0A; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        .mockup-img {
            transform: perspective(1000px) rotateY(-5deg);
            transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.6));
        }
        .mockup-img:hover { transform: perspective(1000px) rotateY(0deg) translateY(-10px) scale(1.02); }
        details summary { list-style: none; }
        details summary::-webkit-details-marker { display: none; }
        @keyframes urgent-pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
        .animate-urgent-icon { animation: urgent-pulse 1.5s ease-in-out infinite; }
        .ai-shimmer {
            background: linear-gradient(90deg, rgba(255,69,0,0) 0%, rgba(255,69,0,0.1) 50%, rgba(255,69,0,0) 100%);
            background-size: 200% 100%;
            animation: shimmer 2s infinite linear;
        }
        .scrollbar-hide::-webkit-scrollbar { display:none !important; height:0 !important; width:0 !important; }
        .scrollbar-hide { -ms-overflow-style:none !important; scrollbar-width:none !important; }

        /* KEYFRAMES REQUERIDO */
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        /* DISEÑO ADICIONAL PREMIUM */
        header {
            max-width: 1000px;
            margin: 0 auto;
            padding: 4rem 1.5rem 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .nav-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .logo {
            font-weight: 800;
            font-size: 1.2rem;
            letter-spacing: -0.02em;
            color: #FF4500;
            text-transform: uppercase;
        }

        .progress-pill {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.5rem 1rem;
            border-radius: 99px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #A3A3A3;
        }

        .header-content h1 {
            font-size: clamp(2.5rem, 8vw, 4rem);
            margin: 0;
            font-weight: 900;
            letter-spacing: -0.04em;
            background: linear-gradient(180deg, #FFFFFF 0%, #A3A3A3 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-content p {
            font-size: 1.1rem;
            color: #737373;
            max-width: 500px;
            line-height: 1.6;
        }

        main {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 1.5rem 4rem;
        }

        .section-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #525252;
            margin-bottom: 1.5rem;
            margin-top: 4rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::after {
            content: '';
            height: 1px;
            background: rgba(255, 255, 255, 0.05);
            flex: 1;
        }

        .lessons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
        }

        /* CARD STYLE */
        .lesson-card {
            background: rgba(18, 18, 18, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative;
        }

        .lesson-card:hover {
            transform: translateY(-8px);
            border-color: rgba(255, 69, 0, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 20px rgba(255, 69, 0, 0.05);
        }

        .thumbnail {
            aspect-ratio: 16/9;
            background: linear-gradient(45deg, #1A1A1A, #2A2A2A);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .thumbnail::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(255,69,0,0.1) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.4s;
        }

        .lesson-card:hover .thumbnail::after {
            opacity: 1;
        }

        .play-icon {
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
            transition: transform 0.3s;
        }

        .play-icon svg {
            fill: white;
            margin-left: 3px;
        }

        .lesson-card:hover .play-icon {
            transform: scale(1.15);
            background: #FF4500;
        }

        .duration-tag {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: rgba(0, 0, 0, 0.8);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            z-index: 2;
        }

        .card-content {
            padding: 1.5rem;
        }

        .card-content h3 {
            margin: 0 0 0.5rem 0;
            font-size: 1.2rem;
            font-weight: 700;
        }

        .card-content p {
            margin: 0;
            color: #737373;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        /* QUICK TOOLS SECTION */
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-top: 1rem;
        }

        .tool-mini-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 0.75rem;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .tool-mini-card:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
            transform: translateY(-4px);
        }

        .tool-icon {
            width: 40px;
            height: 40px;
            background: rgba(255, 69, 0, 0.1);
            color: #FF4500;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tool-mini-card span {
            font-size: 0.8rem;
            font-weight: 600;
            color: #A3A3A3;
        }

        .tool-mini-card:hover span {
            color: white;
        }

        /* MODAL STYLE */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: #111;
            width: 100%;
            max-width: 800px;
            max-height: 90vh;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow-y: auto;
            position: relative;
            transform: translateY(20px);
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .video-container {
            aspect-ratio: 16/9;
            background: #000;
            width: 100%;
        }

        .video-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .modal-body {
            padding: 2rem;
        }

        .modal-body h2 {
            margin: 0 0 1rem 0;
            font-size: 1.75rem;
            letter-spacing: -0.02em;
        }

        .modal-body p {
            color: #A3A3A3;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .learning-list {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .learning-list h4 {
            margin: 0 0 1rem 0;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #737373;
        }

        .learning-list ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: grid;
            gap: 0.75rem;
        }

        .learning-list li {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.95rem;
        }

        .learning-list li::before {
            content: '✓';
            color: #FF4500;
            font-weight: bold;
        }

        .modal-footer {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-primary {
            background: #E5E5E5;
            color: #0A0A0A;
            flex: 1;
        }

        .btn-primary:hover {
            background: #FFFFFF;
            transform: scale(1.02);
        }

        .btn-primary.completed {
            background: #1a331a;
            color: #4ade80;
            border: 1px solid rgba(74, 222, 128, 0.2);
        }

        .btn-secondary {
            background: transparent;
            color: #737373;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        .close-x {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            z-index: 10;
        }

        /* ESTADO VISTO EN CARD */
        .lesson-card.is-completed {
            border-color: rgba(74, 222, 128, 0.2);
        }
        .lesson-card.is-completed .thumbnail::before {
            content: 'COMPLETADO';
            position: absolute;
            top: 12px;
            left: 12px;
            background: #4ade80;
            color: #000;
            font-size: 0.65rem;
            font-weight: 800;
            padding: 4px 8px;
            border-radius: 4px;
            z-index: 5;
        }

        @media (max-width: 768px) {
            header { padding-top: 2rem; }
            .lessons-grid { grid-template-columns: 1fr; }
            .tools-grid { grid-template-columns: 1fr; }
            .modal-footer { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="bg-grid-pattern"></div>

    <header>
        <div class="nav-top">
            <div class="logo">Aula Digital</div>
            <div class="progress-pill" id="globalProgress">Progreso: 0/2</div>
        </div>
        <div class="header-content">
            <h1>Classroom</h1>
            <p>Elige una lección y aprende en 5 minutos. Contenido optimizado para tu crecimiento profesional.</p>
        </div>
    </header>

    <main>
        <div class="section-title">Lecciones disponibles</div>
        <div class="lessons-grid" id="lessonsContainer">
            <!-- Renderizado via JS -->
        </div>

        <div class="section-title">Herramientas rápidas</div>
        <div class="tools-grid">
            <div class="tool-mini-card">
                <div class="tool-icon">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                </div>
                <span>Contrato Editable</span>
            </div>
            <div class="tool-mini-card">
                <div class="tool-icon">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                </div>
                <span>Facturación</span>
            </div>
            <div class="tool-mini-card">
                <div class="tool-icon">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 8v8m-4-5v5m-4-2v2m-2 4h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                </div>
                <span>Calculadora</span>
            </div>
        </div>
    </main>

    <!-- Modal Template -->
    <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-content" id="modalContent">
            <button class="close-x" id="btnCloseTop" aria-label="Cerrar modal">&times;</button>
            <div class="video-container">
                <iframe id="modalVideo" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
            <div class="modal-body">
                <h2 id="modalTitle">Título de la Lección</h2>
                <p id="modalDescription">Descripción extendida...</p>
                
                <div class="learning-list">
                    <h4>Lo que vas a aprender</h4>
                    <ul id="modalBullets">
                        <!-- Bullets via JS -->
                    </ul>
                </div>

                <div class="modal-footer">
                    <button class="btn btn-primary" id="btnMarkComplete">Marcar como visto</button>
                    <button class="btn btn-secondary" id="btnClose">Cerrar</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // DATOS DE LAS LECCIONES
        const lessons = [
            {
                id: 1,
                title: "Bienvenida y mapa del curso",
                youtubeId: "a96CZ0cVmXg",
                duration: "5:12",
                description: "Te muestro cómo está organizada la experiencia y cómo avanzar rápido sin perderte.",
                bullets: ["Cómo navegar el aula", "Qué ver primero", "Cómo medir tu progreso"],
                completed: false
            },
            {
                id: 2,
                title: "Tu primer resultado en 10 minutos",
                youtubeId: "ysz5S6PUM-U",
                duration: "8:04",
                description: "Configura lo mínimo y consigue un resultado visible hoy mismo.",
                bullets: ["Setup esencial", "Atajos que ahorran tiempo", "Errores comunes"],
                completed: false
            }
        ];

        let activeLessonId = null;

        // ELEMENTOS DOM
        const lessonsContainer = document.getElementById('lessonsContainer');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalTitle = document.getElementById('modalTitle');
        const modalDescription = document.getElementById('modalDescription');
        const modalVideo = document.getElementById('modalVideo');
        const modalBullets = document.getElementById('modalBullets');
        const btnMarkComplete = document.getElementById('btnMarkComplete');
        const globalProgress = document.getElementById('globalProgress');

        // RENDERIZAR TARJETAS
        function renderLessons() {
            lessonsContainer.innerHTML = '';
            lessons.forEach(lesson => {
                const card = document.createElement('div');
                card.className = `lesson-card ${lesson.completed ? 'is-completed' : ''}`;
                card.onclick = () => openModal(lesson.id);
                
                card.innerHTML = `
                    <div class="thumbnail">
                        <div class="play-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        </div>
                        <span class="duration-tag">${lesson.duration}</span>
                    </div>
                    <div class="card-content">
                        <h3>${lesson.title}</h3>
                        <p>${lesson.description}</p>
                    </div>
                `;
                lessonsContainer.appendChild(card);
            });
            updateProgressText();
        }

        // CONTROL DE MODAL
        function openModal(id) {
            const lesson = lessons.find(l => l.id === id);
            if (!lesson) return;

            activeLessonId = id;
            modalTitle.innerText = lesson.title;
            modalDescription.innerText = lesson.description;
            modalVideo.src = `https://www.youtube.com/embed/${lesson.youtubeId}`;
            
            modalBullets.innerHTML = lesson.bullets
                .map(bullet => `<li>${bullet}</li>`)
                .join('');

            updateCompleteButton(lesson.completed);

            modalOverlay.classList.add('active');
            document.body.style.overflow = 'hidden'; // Bloquear scroll
            
            // Focus trap básico
            setTimeout(() => document.getElementById('btnCloseTop').focus(), 100);
        }

        function closeModal() {
            modalOverlay.classList.remove('active');
            document.body.style.overflow = 'auto'; // Habilitar scroll
            modalVideo.src = ''; // Detener video
            activeLessonId = null;
        }

        // COMPLETAR LECCIÓN
        function toggleComplete() {
            const lesson = lessons.find(l => l.id === activeLessonId);
            if (lesson) {
                lesson.completed = !lesson.completed;
                updateCompleteButton(lesson.completed);
                renderLessons();
            }
        }

        function updateCompleteButton(isCompleted) {
            if (isCompleted) {
                btnMarkComplete.innerText = '✓ Lección vista';
                btnMarkComplete.classList.add('completed');
            } else {
                btnMarkComplete.innerText = 'Marcar como visto';
                btnMarkComplete.classList.remove('completed');
            }
        }

        function updateProgressText() {
            const completedCount = lessons.filter(l => l.completed).length;
            globalProgress.innerText = `Progreso: ${completedCount}/${lessons.length}`;
        }

        // EVENTOS
        btnMarkComplete.onclick = toggleComplete;
        document.getElementById('btnClose').onclick = closeModal;
        document.getElementById('btnCloseTop').onclick = closeModal;

        // Cerrar al click fuera
        modalOverlay.onclick = (e) => {
            if (e.target === modalOverlay) closeModal();
        };

        // Cerrar con Escape
        window.onkeydown = (e) => {
            if (e.key === 'Escape') closeModal();
        };

        // INICIO
        window.onload = renderLessons;
    </script>
</body>
</html>
